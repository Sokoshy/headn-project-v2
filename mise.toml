[tools]
java = "25"
maven = "3.9"

[tasks.dev]
run = "mvn spring-boot:run"

[tasks.build]
run = "mvn clean package"

[tasks.start]
run = "mvn spring-boot:run"

[tasks.test]
run = "mvn test"

[tasks."test:all"]
run = "mvn verify"

[tasks.db]
run = "docker compose up -d"

[tasks."db:stop"]
run = "docker compose down"
