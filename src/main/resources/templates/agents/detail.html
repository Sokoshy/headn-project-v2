<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout (${agent.nom}, ~{::content})}">
<head>
    <title th:text="${agent.nom}">Détail</title>
</head>
<body>
    <div th:fragment="content">
        <div class="detail-header">
            <div>
                <h1 class="detail-title" th:text="${agent.nom}">Nom de l'agent</h1>
            </div>
            <div class="detail-actions">
                <a th:href="@{/agents/{id}/edit(id=${agent.id})}" class="btn btn-secondary">
                    <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                    Modifier
                </a>
                <form th:if="${agent.actif}" th:action="@{/agents/{id}/deactivate(id=${agent.id})}" method="post" class="inline-form">
                    <input type="hidden" th:name="_csrf" th:value="${_csrf.token}">
                    <button type="submit"
                            class="btn btn-warning"
                            onclick="return confirm('Êtes-vous sûr de vouloir désactiver cet agent ?')">
                        Désactiver
                    </button>
                </form>
                <form th:unless="${agent.actif}" th:action="@{/agents/{id}/reactivate(id=${agent.id})}" method="post" class="inline-form">
                    <input type="hidden" th:name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-success">
                        Réactiver
                    </button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <dl class="detail-list">
                    <div class="detail-item">
                        <dt>Nom</dt>
                        <dd th:text="${agent.nom}">Nom</dd>
                    </div>
                    <div class="detail-item">
                        <dt>Email</dt>
                        <dd>
                            <a th:href="'mailto:' + ${agent.email}"
                               th:text="${agent.email}"
                               class="link-primary">
                                email@example.com
                            </a>
                        </dd>
                    </div>
                    <div class="detail-item">
                        <dt>Rôle</dt>
                        <dd>
                            <span th:if="${agent.role.name() == 'ADMIN'}" class="badge badge-primary">Administrateur</span>
                            <span th:if="${agent.role.name() == 'LIBRARIAN'}" class="badge badge-neutral">Bibliothécaire</span>
                        </dd>
                    </div>
                    <div class="detail-item" th:if="${agent.telephone}">
                        <dt>Téléphone</dt>
                        <dd th:text="${agent.telephone}">0102030405</dd>
                    </div>
                    <div class="detail-item">
                        <dt>Statut</dt>
                        <dd>
                            <span th:if="${agent.actif}" class="badge badge-success">Actif</span>
                            <span th:unless="${agent.actif}" class="badge badge-warning">Désactivé</span>
                        </dd>
                    </div>
                    <div class="detail-item">
                        <dt>Date de création</dt>
                        <dd th:text="${agent.dateCreation != null ? #temporals.format(agent.dateCreation, 'dd MMMM yyyy') : '—'}">—</dd>
                    </div>
                </dl>
            </div>
        </div>

        <div class="mt-6">
            <a th:href="@{/agents}" class="btn btn-ghost">
                <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12,19 5,12 12,5"/>
                </svg>
                Retour à la liste
            </a>
        </div>
    </div>
</body>
</html>
