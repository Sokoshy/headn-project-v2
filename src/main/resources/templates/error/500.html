<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout ('Erreur 500 - Erreur serveur', ~{::content})}">
<head>
    <title>Erreur 500 - Erreur serveur</title>
</head>
<body>
    <div th:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Erreur serveur</h1>
                <p class="page-subtitle">Une erreur interne s'est produite</p>
            </div>
        </div>

        <div class="card">
            <div class="card-body text-center">
                <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <h2 class="mt-6">Erreur 500</h2>
                <p class="text-muted mt-2">Désolé, une erreur inattendue s'est produite sur le serveur.</p>
                <p class="text-muted">Veuillez réessayer plus tard ou contacter l'administrateur si le problème persiste.</p>
                <div class="actions-bar mt-8 justify-center">
                    <a th:href="@{/}" class="btn btn-primary">
                        <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9,22 9,12 15,12 15,22"/>
                        </svg>
                        Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
