<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout (~{::title}, ~{::content})}">
<head>
    <title>Erreur 403 - Accès refusé</title>
</head>
<body>
    <div th:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Accès refusé</h1>
                <p class="page-subtitle">Vous n'avez pas l'autorisation d'accéder à cette ressource</p>
            </div>
        </div>

        <div class="card">
            <div class="card-body text-center">
                <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <h2 class="mt-6">Erreur 403</h2>
                <p class="text-muted mt-2">Désolé, vous n'avez pas l'autorisation d'accéder à cette page.</p>
                <p class="text-muted">Si vous pensez que c'est une erreur, veuillez contacter l'administrateur.</p>
                <div class="actions-bar mt-8 justify-center">
                    <a th:href="@{/}" class="btn btn-primary">
                        <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9,22 9,12 15,12 15,22"/>
                        </svg>
                        Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
