<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout ('Erreur 404 - Page non trouvée', ~{::content})}">
<head>
    <title>Erreur 404 - Page non trouvée</title>
</head>
<body>
    <div th:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Page non trouvée</h1>
                <p class="page-subtitle">La page que vous recherchez n'existe pas</p>
            </div>
        </div>

        <div class="card">
            <div class="card-body text-center">
                <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M16 16s-1.5-2-4-2-4 2-4 2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                <h2 class="mt-6">Erreur 404</h2>
                <p class="text-muted mt-2">Désolé, la page que vous recherchez semble introuvable.</p>
                <p class="text-muted">Vous pouvez retourner à l'accueil ou naviguer via le menu.</p>
                <div class="actions-bar mt-8 justify-center">
                    <a th:href="@{/}" class="btn btn-primary">
                        <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9,22 9,12 15,12 15,22"/>
                        </svg>
                        Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
