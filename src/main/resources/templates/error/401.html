<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout (~{::title}, ~{::content})}">
<head>
    <title>Erreur 401 - Authentification requise</title>
</head>
<body>
    <div th:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Authentification requise</h1>
                <p class="page-subtitle">Vous devez être authentifié pour accéder à cette ressource</p>
            </div>
        </div>

        <div class="card">
            <div class="card-body text-center">
                <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v.01"/>
                    <path d="M12 8a2 2 0 0 1 2 2c0 2-2 2-2 4"/>
                </svg>
                <h2 class="mt-6">Erreur 401</h2>
                <p class="text-muted mt-2">Vous n'êtes pas autorisé à accéder à cette page sans authentification.</p>
                <p class="text-muted">Veuillez vous connecter ou revenir à l'accueil.</p>
                <div class="actions-bar mt-8 justify-center">
                    <a th:href="@{/}" class="btn btn-primary">
                        <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9,22 9,12 15,12 15,22"/>
                        </svg>
                        Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
