<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout (title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Bibliothèque'">Connexion - Bibliothèque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <a href="#main-content" class="skip-link">Aller au contenu principal</a>

    <header class="header">
        <div class="header-container">
            <a th:href="@{/}" class="logo" aria-label="Accueil de la bibliothèque">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                <span class="logo-text">Bibliothèque</span>
            </a>
        </div>
    </header>

    <main id="main-content" class="main" tabindex="-1">
        <div class="container container-narrow">
            <div th:if="${param.error}" class="alert alert-error" role="alert" aria-live="assertive">
                <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span>Identifiants invalides</span>
            </div>

            <div th:if="${param.logout}" class="alert alert-success" role="alert" aria-live="polite">
                <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22,4 12,14.01 9,11.01"/>
                </svg>
                <span>Vous avez été déconnecté avec succès.</span>
            </div>

            <div th:if="${success}" class="alert alert-success" role="alert" aria-live="polite">
                <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22,4 12,14.01 9,11.01"/>
                </svg>
                <span th:text="${success}">Succès</span>
            </div>

            <div class="card auth-card">
                <div class="card-body">
                    <h1 class="auth-title">Connexion</h1>
                    <p class="auth-subtitle">Accédez au gestionnaire de bibliothèque</p>

                    <form th:action="@{/login}" method="post" class="form">
                        <input type="hidden" th:name="_csrf" th:value="${_csrf.token}">
                        <div class="form-group">
                            <label for="username" class="form-label">Email</label>
                            <input type="email"
                                   id="username"
                                   name="username"
                                   class="form-input"
                                   placeholder="votre.email@exemple.com"
                                   required
                                   autocomplete="username"
                                   autofocus>
                        </div>

                        <div class="form-group">
                            <label for="password" class="form-label">Mot de passe</label>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   class="form-input"
                                   placeholder="Votre mot de passe"
                                   required
                                   autocomplete="current-password">
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">
                            <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                                <polyline points="10,17 15,12 10,7"/>
                                <line x1="15" y1="12" x2="3" y2="12"/>
                            </svg>
                            Se connecter
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer" role="contentinfo">
        <div class="footer-container">
            <p class="footer-text">Gestionnaire de Bibliothèque</p>
        </div>
    </footer>
</body>
</html>
