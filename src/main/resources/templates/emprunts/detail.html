<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout (~{::title}, ~{::main})}">
<head>
    <title>Détail emprunt</title>
</head>
<body>
    <main th:fragment="content">
        <div class="detail-header">
            <div>
                <h1 class="detail-title">Détail de l'emprunt</h1>
            </div>
            <div class="detail-actions" th:if="${emprunt.estEnCours()}">
                <form th:action="@{/emprunts/{id}/retour(id=${emprunt.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-primary">
                        <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9,14 4,9 9,4"/>
                            <path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
                        </svg>
                        Enregistrer le retour
                    </button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Informations</h2>
            </div>
            <div class="card-body">
                <dl class="detail-list">
                    <div class="detail-item">
                        <dt>Livre</dt>
                        <dd>
                            <a th:href="@{/livres/{id}(id=${emprunt.livre.id})}"
                               th:text="${emprunt.livre.titre}"
                               class="link-primary-strong">
                                Titre
                            </a>
                            <span th:text="' - ' + ${emprunt.livre.auteur}" class="link-muted"> - Auteur</span>
                        </dd>
                    </div>
                    <div class="detail-item">
                        <dt>Utilisateur</dt>
                        <dd>
                            <a th:href="@{/utilisateurs/{id}(id=${emprunt.utilisateur.id})}"
                               th:text="${emprunt.utilisateur.nom}"
                               class="link-primary-strong">
                                Nom
                            </a>
                        </dd>
                    </div>
                    <div class="detail-item">
                        <dt>Date d'emprunt</dt>
                        <dd th:text="${#temporals.format(emprunt.dateEmprunt, 'dd MMMM yyyy')}">01 janvier 2024</dd>
                    </div>
                    <div class="detail-item">
                        <dt>Date de retour</dt>
                        <dd th:text="${emprunt.dateRetour != null ? #temporals.format(emprunt.dateRetour, 'dd MMMM yyyy') : 'En cours'}" class="return-date-value">
                            En cours
                        </dd>
                    </div>
                    <div class="detail-item">
                        <dt>Statut</dt>
                        <dd>
                            <span th:if="${emprunt.estEnCours() and !emprunt.estEnRetard()}" class="badge badge-success">
                                <svg class="icon-xs icon-badge" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <polyline points="12,6 12,12 16,14"/>
                                </svg>
                                En cours
                            </span>
                            <span th:if="${emprunt.estEnRetard()}" class="badge badge-danger">
                                <svg class="icon-xs icon-badge" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <line x1="12" y1="8" x2="12" y2="12"/>
                                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                                </svg>
                                En retard
                            </span>
                            <span th:if="${!emprunt.estEnCours()}" class="badge badge-neutral">
                                <svg class="icon-xs icon-badge" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="20,6 9,17 4,12"/>
                                </svg>
                                Terminé
                            </span>
                        </dd>
                    </div>
                </dl>
            </div>
        </div>

        <div class="mt-6">
            <a th:href="@{/emprunts}" class="btn btn-ghost">
                <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12,19 5,12 12,5"/>
                </svg>
                Retour à la liste
            </a>
        </div>
    </main>
</body>
</html>
