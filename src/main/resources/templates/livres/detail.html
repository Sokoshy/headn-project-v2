<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout (~{::title}, ~{::main})}">
<head>
    <title th:text="${livre.titre}">Détail</title>
</head>
<body>
    <main th:fragment="content">
        <div class="detail-header">
            <div>
                <h1 class="detail-title" th:text="${livre.titre}">Titre du livre</h1>
                <p class="detail-meta">Ajouté le <span th:text="${#temporals.format(livre.dateCreation, 'dd MMMM yyyy')}">01 janvier 2024</span></p>
            </div>
            <div class="detail-actions">
                <a th:href="@{/livres/{id}/edit(id=${livre.id})}" class="btn btn-secondary">
                    <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                    Modifier
                </a>
                <form th:action="@{/livres/{id}/delete(id=${livre.id})}" method="post" class="inline-form">
                    <button type="submit"
                            class="btn btn-danger"
                            onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce livre ?')">
                        <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3,6 5,6 21,6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        Supprimer
                    </button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <dl class="detail-list">
                    <div class="detail-item">
                        <dt>Titre</dt>
                        <dd th:text="${livre.titre}">Titre</dd>
                    </div>
                    <div class="detail-item">
                        <dt>Auteur</dt>
                        <dd th:text="${livre.auteur}">Auteur</dd>
                    </div>
                    <div class="detail-item">
                        <dt>Disponibilité</dt>
                        <dd>
                            <span th:if="${livre.disponible}" class="badge badge-success">
                                <svg class="icon-xs icon-badge" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="20,6 9,17 4,12"/>
                                </svg>
                                Disponible
                            </span>
                            <span th:unless="${livre.disponible}" class="badge badge-warning">
                                <svg class="icon-xs icon-badge" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <line x1="12" y1="8" x2="12" y2="12"/>
                                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                                </svg>
                                Emprunté
                            </span>
                        </dd>
                    </div>
                    <div class="detail-item">
                        <dt>Date d'ajout</dt>
                        <dd th:text="${#temporals.format(livre.dateCreation, 'dd MMMM yyyy')}">01 janvier 2024</dd>
                    </div>
                </dl>
            </div>
        </div>

        <div class="mt-6">
            <a th:href="@{/livres}" class="btn btn-ghost">
                <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12,19 5,12 12,5"/>
                </svg>
                Retour à la liste
            </a>
        </div>
    </main>
</body>
</html>
