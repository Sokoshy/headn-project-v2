<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout (${livre.id != null} ? 'Modifier un livre' : 'Ajouter un livre', ~{::content})}">
<head>
    <title th:text="${livre.id != null} ? 'Modifier un livre' : 'Ajouter un livre'">Formulaire</title>
</head>
<body>
    <div th:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title" th:text="${livre.id != null} ? 'Modifier le livre' : 'Ajouter un livre'"></h1>
                <p class="page-subtitle" th:text="${livre.id != null} ? 'Modifiez les informations du livre' : 'Remplissez les informations du nouveau livre'"></p>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="${livre.id != null} ? @{/livres/{id}(id=${livre.id})} : @{/livres}"
                      th:object="${livre}"
                      method="post">
                    <input type="hidden" th:name="_csrf" th:value="${_csrf.token}">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-group">
                        <label for="titre" class="form-label required">Titre</label>
                        <input type="text"
                               id="titre"
                               th:field="*{titre}"
                               class="form-input"
                               th:classappend="${#fields.hasErrors('titre')} ? 'error'"
                               placeholder="Titre du livre"
                               required>
                        <span th:if="${#fields.hasErrors('titre')}" th:errors="*{titre}" class="form-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="auteur" class="form-label required">Auteur</label>
                        <input type="text"
                               id="auteur"
                               th:field="*{auteur}"
                               class="form-input"
                               th:classappend="${#fields.hasErrors('auteur')} ? 'error'"
                               placeholder="Nom de l'auteur"
                               required>
                        <span th:if="${#fields.hasErrors('auteur')}" th:errors="*{auteur}" class="form-error"></span>
                    </div>

                    <div class="actions-bar mt-8">
                        <a th:href="@{/livres}" class="btn btn-secondary">Annuler</a>
                        <button type="submit" class="btn btn-primary" th:text="${livre.id != null} ? 'Enregistrer les modifications' : 'Ajouter le livre'">
                            Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
