<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout (~{::title}, ~{::content})}">
<head>
    <title>Utilisateurs</title>
</head>
<body>
    <div th:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Utilisateurs</h1>
                <p class="page-subtitle">Gérez les membres de la bibliothèque</p>
            </div>
        </div>

        <div class="actions-bar">
            <div class="search-box">
                <label for="recherche-utilisateurs" class="sr-only">Rechercher un utilisateur par nom ou email</label>
                <div class="search-input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text"
                           id="recherche-utilisateurs"
                           class="search-input"
                           name="recherche"
                           th:value="${recherche}"
                           placeholder="Rechercher par nom ou email..."
                           form="search-form">
                </div>
                <button type="submit" form="search-form" class="btn btn-primary">Rechercher</button>
                <a th:if="${recherche}" th:href="@{/utilisateurs}" class="btn btn-secondary">Réinitialiser</a>
            </div>
            <a th:href="@{/utilisateurs/nouveau}" class="btn btn-primary">
                <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Nouvel utilisateur
            </a>
        </div>

        <form id="search-form" method="get" th:action="@{/utilisateurs}" class="hidden-form"></form>

        <div th:if="${utilisateurs.isEmpty()}" class="empty-state">
            <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
            </svg>
            <h3 class="empty-state-title">Aucun utilisateur trouvé</h3>
            <p class="empty-state-text" th:text="${recherche != null and !recherche.isEmpty()} ? |Aucun résultat pour &quot;${recherche}&quot;| : 'Commencez par ajouter un utilisateur'"></p>
            <a th:if="${!recherche}" th:href="@{/utilisateurs/nouveau}" class="btn btn-primary">Ajouter un utilisateur</a>
        </div>

        <div th:unless="${utilisateurs.isEmpty()}" class="table-container">
            <table class="table">
                <caption class="sr-only">Liste des utilisateurs avec le nom, l'email et les actions disponibles</caption>
                <thead>
                    <tr>
                        <th scope="col">Nom</th>
                        <th scope="col">Email</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="utilisateur : ${utilisateurs}">
                        <td>
                            <a th:href="@{/utilisateurs/{id}(id=${utilisateur.id})}"
                               th:text="${utilisateur.nom}"
                               class="table-link-strong">
                                Nom
                            </a>
                        </td>
                        <td th:text="${utilisateur.email}">email@example.com</td>
                        <td>
                            <div class="actions">
                                <a th:href="@{/utilisateurs/{id}(id=${utilisateur.id})}" class="btn btn-ghost btn-sm">Voir</a>
                                <a th:href="@{/utilisateurs/{id}/edit(id=${utilisateur.id})}" class="btn btn-ghost btn-sm">Modifier</a>
                                <form th:action="@{/utilisateurs/{id}/delete(id=${utilisateur.id})}" method="post" class="inline-form">
                                    <button type="submit"
                                            class="btn btn-ghost btn-sm btn-text-danger"
                                            onclick="return confirm('Êtes-vous sûr de vouloir supprimer cet utilisateur ?')">
                                        Supprimer
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
