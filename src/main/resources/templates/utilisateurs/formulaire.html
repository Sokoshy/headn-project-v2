<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout (~{::title}, ~{::content})}">
<head>
    <title th:text="${utilisateur.id != null} ? 'Modifier un utilisateur' : 'Ajouter un utilisateur'">Formulaire</title>
</head>
<body>
    <div th:fragment="content">
        <div class="page-header">
            <div>
                <h1 class="page-title" th:text="${utilisateur.id != null} ? 'Modifier l\'utilisateur' : 'Ajouter un utilisateur'"></h1>
                <p class="page-subtitle" th:text="${utilisateur.id != null} ? 'Modifiez les informations de l\'utilisateur' : 'Remplissez les informations du nouvel utilisateur'"></p>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="${utilisateur.id != null} ? @{/utilisateurs/{id}(id=${utilisateur.id})} : @{/utilisateurs}"
                      th:object="${utilisateur}"
                      method="post">
                    <input type="hidden" th:name="_csrf" th:value="${_csrf.token}">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-group">
                        <label for="nom" class="form-label required">Nom</label>
                        <input type="text"
                               id="nom"
                               th:field="*{nom}"
                               class="form-input"
                               th:classappend="${#fields.hasErrors('nom')} ? 'error'"
                               placeholder="Nom complet"
                               required>
                        <span th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="form-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label required">Email</label>
                        <input type="email"
                               id="email"
                               th:field="*{email}"
                               class="form-input"
                               th:classappend="${#fields.hasErrors('email')} ? 'error'"
                               placeholder="adresse@exemple.com"
                               required>
                        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="form-error"></span>
                    </div>

                    <div class="actions-bar mt-8">
                        <a th:href="@{/utilisateurs}" class="btn btn-secondary">Annuler</a>
                        <button type="submit" class="btn btn-primary" th:text="${utilisateur.id != null} ? 'Enregistrer les modifications' : 'Ajouter l\'utilisateur'">
                            Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
