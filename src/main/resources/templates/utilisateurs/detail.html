<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout (~{::title}, ~{::main})}">
<head>
    <title th:text="${utilisateur.nom}">Détail</title>
</head>
<body>
    <main th:fragment="content">
        <div class="detail-header">
            <div>
                <h1 class="detail-title" th:text="${utilisateur.nom}">Nom de l'utilisateur</h1>
            </div>
            <div class="detail-actions">
                <a th:href="@{/utilisateurs/{id}/edit(id=${utilisateur.id})}" class="btn btn-secondary">
                    <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                    Modifier
                </a>
                <form th:action="@{/utilisateurs/{id}/delete(id=${utilisateur.id})}" method="post" class="inline-form">
                    <button type="submit"
                            class="btn btn-danger"
                            onclick="return confirm('Êtes-vous sûr de vouloir supprimer cet utilisateur ?')">
                        <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3,6 5,6 21,6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        Supprimer
                    </button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <dl class="detail-list">
                    <div class="detail-item">
                        <dt>Nom</dt>
                        <dd th:text="${utilisateur.nom}">Nom</dd>
                    </div>
                    <div class="detail-item">
                        <dt>Email</dt>
                        <dd>
                            <a th:href="'mailto:' + ${utilisateur.email}"
                               th:text="${utilisateur.email}"
                               class="link-primary">
                                email@example.com
                            </a>
                        </dd>
                    </div>
                </dl>
            </div>
        </div>

        <div class="mt-6">
            <a th:href="@{/utilisateurs}" class="btn btn-ghost">
                <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12,19 5,12 12,5"/>
                </svg>
                Retour à la liste
            </a>
        </div>
    </main>
</body>
</html>
